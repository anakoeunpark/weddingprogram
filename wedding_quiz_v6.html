<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고운 & 재원의 결혼식 상식 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F7F3EC;
    --warm: #EDE5D8;
    --gold: #B8976A;
    --gold-light: #D4B896;
    --gold-dark: #8A6A40;
    --ink: #2C2218;
    --ink-muted: #9A8A78;
    --green: #4A6650;
    --border: rgba(184,151,106,0.25);
  }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    padding-bottom: 80px;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(184,151,106,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 90% 100%, rgba(74,102,80,0.06) 0%, transparent 60%);
  }
  header { text-align: center; padding: 4rem 2rem 2rem; }
  .header-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; color: var(--gold);
    font-size: 14px; letter-spacing: 0.25em; margin-bottom: 1rem; opacity: 0.8;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: clamp(26px, 5vw, 42px);
    line-height: 1.3; letter-spacing: 0.05em;
  }
  h1 em { font-style: italic; color: var(--gold-dark); }
  .header-sub {
    margin-top: 0.75rem; font-size: 12px;
    color: var(--ink-muted); letter-spacing: 0.2em; font-weight: 300;
  }
  .divider {
    display: flex; align-items: center; gap: 12px;
    max-width: 260px; margin: 1.5rem auto; color: var(--gold);
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 0.5px; background: var(--gold-light);
  }
  .stats-row {
    max-width: 820px; margin: 0 auto 1.25rem;
    padding: 0 1.5rem; display: flex; justify-content: flex-end;
  }
  .stats { font-size: 12px; color: var(--ink-muted); }
  .stats span { color: var(--gold-dark); font-weight: 600; }
  .quiz-grid {
    max-width: 820px; margin: 0 auto;
    padding: 0 1.5rem 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 12px;
  }
  .q-card {
    background: white; border: 0.5px solid var(--border);
    border-radius: 12px; padding: 1.1rem 1.3rem;
    cursor: pointer; transition: all 0.22s;
    position: relative; overflow: hidden; animation: fadeUp 0.4s ease both;
  }
  .q-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 3px; height: 100%; background: var(--gold-light);
    opacity: 0; transition: opacity 0.22s;
  }
  .q-card:hover { border-color: var(--gold-light); transform: translateY(-1px); box-shadow: 0 4px 18px rgba(184,151,106,0.1); }
  .q-card:hover::before { opacity: 1; }
  .q-card.revealed { border-color: rgba(74,102,80,0.3); background: linear-gradient(135deg, white 0%, #fafdf9 100%); }
  .q-card.revealed::before { background: var(--green); opacity: 1; }
  .q-top { display: flex; align-items: flex-start; gap: 10px; }
  .q-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; font-style: italic;
    color: var(--ink-muted); min-width: 22px; padding-top: 3px; flex-shrink: 0;
  }
  .q-text { font-size: 14.5px; line-height: 1.65; color: var(--ink); flex: 1; }
  .q-answer {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s ease, opacity 0.3s ease; opacity: 0;
  }
  .q-card.revealed .q-answer { max-height: 200px; opacity: 1; }
  .ans-inner { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid rgba(74,102,80,0.2); }
  .ans-label { font-size: 10px; letter-spacing: 0.15em; color: var(--green); margin-bottom: 3px; text-transform: uppercase; }
  .ans-text { font-size: 15px; font-weight: 600; color: var(--green); line-height: 1.5; }
  .ans-note { margin-top: 5px; font-size: 12px; color: var(--ink-muted); line-height: 1.6; font-style: italic; }
  .hint { margin-top: 8px; font-size: 11px; color: var(--ink-muted); opacity: 0.6; letter-spacing: 0.05em; }
  .q-card.revealed .hint { display: none; }
  .score-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(247,243,236,0.95); backdrop-filter: blur(12px);
    border-top: 0.5px solid var(--border);
    padding: 12px 2rem;
    display: flex; align-items: center; justify-content: center; gap: 2rem; z-index: 100;
  }
  .score-label { font-size: 12px; color: var(--ink-muted); letter-spacing: 0.1em; }
  .score-progress { display: flex; align-items: center; gap: 10px; }
  .progress-track { width: 150px; height: 3px; background: var(--warm); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
  .score-num { font-family: 'Cormorant Garamond', serif; font-size: 14px; color: var(--gold-dark); min-width: 44px; }
  .reset-btn {
    font-family: 'Noto Serif KR', serif; font-size: 11px;
    padding: 4px 12px; border: 0.5px solid var(--border); border-radius: 20px;
    background: transparent; color: var(--ink-muted); cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--gold-light); color: var(--gold-dark); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 600px) {
    .quiz-grid { grid-template-columns: 1fr; }
    .score-bar { gap: 1rem; padding: 10px 1rem; }
    .progress-track { width: 90px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-ornament">✦ 2026. 05. 09 ✦</div>
  <h1>고운 <em>&</em> 재원의<br>결혼식 상식 퀴즈</h1>
  <p class="header-sub">WEDDING QUIZ · 25 QUESTIONS</p>
  <div class="divider">❧</div>
</header>

<div class="stats-row">
  <div class="stats">공개된 정답: <span id="revealed-count">0</span> / 25</div>
</div>

<div class="quiz-grid" id="quiz-list"></div>

<div class="score-bar">
  <span class="score-label">진행률</span>
  <div class="score-progress">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="score-num" id="score-display">0 / 25</span>
  </div>
  <button class="reset-btn" onclick="resetAll()">초기화</button>
</div>

<script>
const quizzes = [
  { n:1,  q:"대한민국 국회의원 정수(총 의석 수)는 몇 명인가?", a:"300명", note:"지역구 254명 + 비례대표 46명" },
  { n:2,  q:"태극기에서 건(乾)·곤(坤)·감(坎)·리(離) 4괘 중 '물'을 상징하는 괘는?", a:"감(坎)", note:"건=하늘, 곤=땅, 감=물, 리=불" },
  { n:3,  q:"지구 대기의 약 78%를 차지하는 기체는?", a:"질소 (N₂)", note:"산소는 약 21%, 나머지는 아르곤·이산화탄소 등" },
  { n:4,  q:"대한민국에서 최저임금을 결정하는 기관은?", a:"최저임금위원회", note:"고용노동부 산하 기관. 매년 8월 고시" },
  { n:5,  q:"'파스퇴르(Pasteur)'가 개발한 것으로 우유를 열처리해 세균을 줄이는 방법은?", a:"저온 살균법 (파스퇴리제이션)", note:"포도주 부패 연구에서 출발" },
  { n:6,  q:"대한민국에서 국민이 낸 세금 중 가장 큰 비중을 차지하는 세목은?", a:"부가가치세 (VAT)", note:"국세 수입의 약 25~30% 차지. 물건 살 때 10% 붙는 세금" },
  { n:7,  q:"한글 창제 당시 원래 자음의 수는 몇 개였나?", a:"17개", note:"현재는 14개. ㅿ·ㆁ·ㆆ 등 소실" },
  { n:8,  q:"전 세계에서 가장 많이 번역된 책은?", a:"성경 (Bible)", note:"약 3,000개 이상의 언어로 번역됨" },
  { n:9,  q:"유엔(UN) 안전보장이사회 상임이사국 5개국을 모두 나열하면?", a:"미국, 영국, 프랑스, 러시아, 중국", note:"상임이사국은 거부권(veto) 보유" },
  { n:10, q:"조선 시대 과거 시험의 최종 합격자를 뭐라고 불렀나?", a:"급제자 (대과 기준 장원·갑과·을과·병과)", note:"소과 합격자는 생원·진사" },
  { n:11, q:"국제 단위계(SI)에서 전류의 단위는?", a:"암페어 (A, Ampere)", note:"전압은 볼트(V), 저항은 옴(Ω)" },
  { n:12, q:"한국의 행정구역 중 특별시·광역시가 아닌 '도(道)'는 몇 개인가?", a:"8개", note:"경기·강원·충북·충남·전북·전남·경북·경남 (제주는 특별자치도)" },
  { n:13, q:"세계 4대 문명 발상지를 모두 나열하면?", a:"메소포타미아, 이집트, 인더스, 황하 문명", note:"각각 티그리스·유프라테스강, 나일강, 인더스강, 황하 유역" },
  { n:14, q:"사람의 폐에서 산소와 이산화탄소가 교환되는 곳은?", a:"폐포 (허파꽈리)", note:"지름 약 0.2mm의 작은 공기주머니. 양쪽 폐에 약 3억 개 존재" },
  { n:15, q:"사람의 체온이 정상 범위보다 낮아지는 상태를 뭐라고 하는가?", a:"저체온증 (低體溫症)", note:"체온 35°C 이하일 때. 반대는 고체온·열사병" },
  { n:16, q:"피카소의 국적은?", a:"스페인", note:"스페인 말라가 출신. 주로 프랑스에서 활동" },
  { n:17, q:"'반도체'라는 이름의 뜻은?", a:"전기가 반쯤 통하는 물질", note:"도체와 부도체의 중간 성질. 실리콘이 대표적" },
  { n:18, q:"대한민국에서 국민이 직접 선출하지 않는 헌법 기관은?", a:"대법원장·헌법재판소장 (대통령이 임명)", note:"국회의원·대통령·지방자치단체장은 직선제" },
  { n:19, q:"빛이 프리즘을 통과하면 여러 색으로 나뉘는 현상의 이름은?", a:"분산 (빛의 굴절에 의한 분산)", note:"파장에 따라 굴절률이 달라서 발생" },
  { n:20, q:"'인플레이션(inflation)'이란 무엇인가?", a:"물가가 전반적으로 지속적으로 오르는 현상", note:"반대는 디플레이션(deflation)" },
  { n:21, q:"조선 후기 실학자로 『목민심서』를 쓴 인물은?", a:"정약용 (丁若鏞)", note:"유배지 강진에서 집필. 『경세유표』·『흠흠신서』도 저술" },
  { n:22, q:"고려 시대에 만들어진 세계 최초의 금속활자본은?", a:"직지심체요절 (直指心體要節)", note:"구텐베르크 성경보다 78년 앞섬" },
  { n:23, q:"'GDP'와 'GNP'의 차이는?", a:"GDP는 국내에서 생산된 것, GNP는 국민이 생산한 것 기준", note:"외국인이 한국에서 번 소득은 GDP엔 포함, GNP엔 미포함" },
  { n:24, q:"지진의 세기를 나타내는 단위 두 가지는?", a:"규모 (Magnitude)와 진도 (Intensity)", note:"규모는 에너지 절대량, 진도는 특정 장소에서 느끼는 흔들림 정도" },
  { n:25, q:"우리나라 법원 체계를 1심부터 순서대로 나열하면?", a:"지방법원 → 고등법원 → 대법원", note:"가정법원·행정법원 등 특수법원도 있음" },
];

let revealed = new Set();

function render() {
  const list = document.getElementById('quiz-list');
  list.innerHTML = quizzes.map((q, i) => `
    <div class="q-card ${revealed.has(q.n) ? 'revealed' : ''}"
         id="qc-${q.n}"
         onclick="reveal(${q.n})"
         style="animation-delay:${Math.min(i * 0.025, 0.55)}s">
      <div class="q-top">
        <span class="q-num">Q${q.n}</span>
        <span class="q-text">${q.q}</span>
      </div>
      <div class="q-answer">
        <div class="ans-inner">
          <div class="ans-label">정 답</div>
          <div class="ans-text">${q.a}</div>
          ${q.note ? `<div class="ans-note">${q.note}</div>` : ''}
        </div>
      </div>
      ${!revealed.has(q.n) ? `<div class="hint">탭하여 정답 확인</div>` : ''}
    </div>
  `).join('');
  updateScore();
}

function reveal(n) {
  revealed.has(n) ? revealed.delete(n) : revealed.add(n);
  render();
}

function updateScore() {
  const count = revealed.size;
  document.getElementById('revealed-count').textContent = count;
  document.getElementById('score-display').textContent = `${count} / 25`;
  document.getElementById('progress-fill').style.width = `${(count / 25) * 100}%`;
}

function resetAll() {
  revealed.clear();
  render();
}

render();
</script>
</body>
</html>
